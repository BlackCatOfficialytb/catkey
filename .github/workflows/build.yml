name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  windows-pyinstaller:
    name: Windows (PyInstaller)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Create venv and install deps
        shell: pwsh
        run: |
          python -m venv .venv
          ./.venv/Scripts/Activate.ps1
          python -m pip install --upgrade pip
          pip install PySide6-Essentials pynput pyinstaller

      - name: Build CatKey (PyInstaller, onedir)
        shell: pwsh
        run: |
          ./.venv/Scripts/Activate.ps1
          ./build.ps1 -Tool pyinstaller

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CatKey-Windows-PyInstaller
          path: dist/CatKey
          if-no-files-found: error

  windows-nuitka:
    name: Windows (Nuitka)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Create venv and install deps
        shell: pwsh
        run: |
          python -m venv .venv
          ./.venv/Scripts/Activate.ps1
          python -m pip install --upgrade pip
          pip install PySide6-Essentials pynput nuitka

      - name: Build CatKey (Nuitka, standalone)
        shell: pwsh
        run: |
          ./.venv/Scripts/Activate.ps1
          ./build.ps1 -Tool nuitka

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CatKey-Windows-Nuitka
          path: dist/run_ui.dist
          if-no-files-found: error

  linux:
    name: Linux (PyInstaller)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          sudo apt-get update
          sudo apt-get install -y libgl1 libxkbcommon0 libdbus-1-3 libxcb-xinerama0 libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 libxcb-image0 libxcb-shm0 libxcb-randr0 libxcb-render-util0 libxcb-xkb1 libxcb1 libfontconfig1 libfreetype6
          pip install PySide6-Essentials pynput pyinstaller

      - name: Build CatKey (PyInstaller)
        run: |
          chmod +x build.sh
          ./build.sh --tool pyinstaller

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CatKey-Linux-PyInstaller
          path: dist/CatKey
          if-no-files-found: error

  release:
    name: Release assets
    needs: [windows-pyinstaller, windows-nuitka, linux]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
